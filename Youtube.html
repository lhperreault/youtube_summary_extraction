<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Transcript" />
  <title>YT Transcript</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
    }

    header {
      padding: 24px 0 20px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #333;
      background: #1a1a1a;
      color: #f1f1f1;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff4444;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    button.primary {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #ff4444;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    button.primary:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    button.primary:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      text-align: center;
      font-size: 14px;
      color: #888;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .status.error { color: #ff6b6b; }
    .status.success { color: #4caf7d; }

    .transcript-box {
      flex: 1;
      background: #1a1a1a;
      border-radius: 14px;
      border: 1.5px solid #2a2a2a;
      padding: 16px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.7;
      color: #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 160px;
      position: relative;
    }

    .transcript-placeholder {
      color: #444;
      font-style: italic;
      text-align: center;
      margin-top: 40px;
    }

    .copy-btn {
      margin-top: 12px;
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1.5px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .copy-btn:active {
      background: #2a2a2a;
      color: #f1f1f1;
    }

    .copy-btn.copied {
      border-color: #4caf7d;
      color: #4caf7d;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <h1>▶ YT Transcript</h1>
    <p>Paste a YouTube URL or video ID</p>
  </header>

  <div class="input-area">
    <input
      type="text"
      id="videoInput"
      placeholder="e.g. youtube.com/watch?v=... or 8aGhZQkoFbQ"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
    />
    <button class="primary" id="fetchBtn" onclick="fetchTranscript()">Get Transcript</button>
  </div>

  <div class="status" id="status"></div>

  <div class="transcript-box" id="transcriptBox">
    <div class="transcript-placeholder">Your transcript will appear here</div>
  </div>

  <button class="copy-btn" id="copyBtn" onclick="copyTranscript()" style="display:none;">Copy Transcript</button>

  <script>
    const WEBHOOK_URL = 'https://hook.eu2.make.com/2i8cku75tlcv2y4udi4i6nza25noa1bt';

    function extractVideoId(input) {
      input = input.trim();
      // Full URL patterns
      const patterns = [
        /[?&]v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /\/embed\/([a-zA-Z0-9_-]{11})/,
        /\/shorts\/([a-zA-Z0-9_-]{11})/,
        /\/live\/([a-zA-Z0-9_-]{11})/,
      ];
      for (const pattern of patterns) {
        const match = input.match(pattern);
        if (match) return match[1];
      }
      // Raw 11-char video ID
      if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
      return null;
    }

    let lastTranscript = '';

    async function fetchTranscript() {
      const input = document.getElementById('videoInput').value;
      const statusEl = document.getElementById('status');
      const boxEl = document.getElementById('transcriptBox');
      const btn = document.getElementById('fetchBtn');
      const copyBtn = document.getElementById('copyBtn');

      const videoId = extractVideoId(input);

      if (!videoId) {
        statusEl.textContent = '⚠️ Couldn\'t find a valid video ID. Try pasting the full URL.';
        statusEl.className = 'status error';
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Fetching…';
      statusEl.textContent = 'Connecting to webhook…';
      statusEl.className = 'status';
      boxEl.innerHTML = '<div class="transcript-placeholder">Loading transcript…</div>';
      copyBtn.style.display = 'none';
      lastTranscript = '';

      try {
        const res = await fetch(`${WEBHOOK_URL}?video_id=${encodeURIComponent(videoId)}`);

        if (!res.ok) {
          throw new Error(`Server error: ${res.status}`);
        }

        const text = await res.text();

        if (!text || text.trim() === 'Accepted') {
          throw new Error('Webhook returned no transcript. The Make scenario may still be processing — try again in a few seconds.');
        }

        lastTranscript = text;
        boxEl.textContent = text;
        statusEl.textContent = `✅ Done — ${text.length.toLocaleString()} characters`;
        statusEl.className = 'status success';
        copyBtn.style.display = 'block';
        copyBtn.textContent = 'Copy Transcript';
        copyBtn.className = 'copy-btn';

      } catch (err) {
        statusEl.textContent = '❌ ' + err.message;
        statusEl.className = 'status error';
        boxEl.innerHTML = '<div class="transcript-placeholder">Something went wrong. See message above.</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Transcript';
      }
    }

    function copyTranscript() {
      if (!lastTranscript) return;
      navigator.clipboard.writeText(lastTranscript).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ Copied!';
        btn.className = 'copy-btn copied';
        setTimeout(() => {
          btn.textContent = 'Copy Transcript';
          btn.className = 'copy-btn';
        }, 2000);
      });
    }

    // Allow pressing Enter to fetch
    document.getElementById('videoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchTranscript();
    });
  </script>

</body>
</html>
